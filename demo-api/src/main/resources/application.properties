spring.application.name=demo-api
# ✅ サーバー上では自動で割り当てられたポートを使い、ローカルでは8080を使う
server.port=${PORT:8080}

# データベースへの接続設定（住所）
# ✅ サーバー上では DB_URL を使い、ローカルでは demo_db を使う
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/demo_db}
# データベースのユーザー名
spring.datasource.username=${DB_USERNAME:user}
# データベースのパスワード
spring.datasource.password=${DB_PASSWORD:password}

# Hibernate（JavaとDBを仲介する人）の設定
# 起動時に、Javaのクラスに合わせて自動でテーブルを作ってくれる設定
spring.jpa.hibernate.ddl-auto=update
# 実行されるSQLをコンソールに表示する
spring.jpa.show-sql=true
# PostgreSQL用の書き方（方言）を指定
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect